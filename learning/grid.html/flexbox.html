<!DOCTYPE html>
<html>
    <head>
        <title>FlexBox Practice</title>
    </head>
    <body>
        <div style="
        margin-top: 20px;
        display: flex;
        flex-direction: row;
        ">
        <div style="background-color: lightblue; width: 100px;">div1</div>
        <div style="background-color: lightpink;
        flex:1;
        ">flex 1</div>
        </div>


         <div style="
        margin-top: 20px;
        display: flex;
        flex-direction: row;
        ">
        <div style="background-color: lightblue; width: 100px;">div1</div>
        <div style="background-color: lightpink;
        flex:1;
        ">flex 1</div>
        <div style="background-color: lightblue;
        flex:2;
        ">flex 2</div>
        </div>
 
        <div style="
        margin-top: 20px;
        height: 60px;
        border-width: 1px;
        border-style: solid;
        border-color: black;
        display: flex;
        flex-direction: row;
        justify-content: center;
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink;
        width: 100px;
        ">100px</div>
        <div style="background-color: lightblue;
        width: 100px;
        ">100px</div>
        </div>

           <div style="
        margin-top: 20px;
        height: 60px;
        border-width: 1px;
        border-style: solid;
        border-color: black;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink;
        width: 100px;
        ">100px</div>
        <div style="background-color: lightblue;
        width: 100px;
        ">100px</div>
        </div>

        <div style="
        margin-top: 20px;
        height: 60px;
        border-width: 1px;
        border-style: solid;
        border-color: black;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: end;
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink;
        width: 100px;
        ">100px</div>
        <div style="background-color: lightblue;
        width: 100px;
        ">100px</div>
        </div>
    </body>
</html>

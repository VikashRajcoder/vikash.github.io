<!DOCTYPE html>
<html>
    <head>
        <title>Grid Practice</title>
    </head>
    <body>
        <div style="display: grid;
        grid-template-columns: 100px 100px;">
            <div style="background-color: lightblue;">div 1</div>
            <div style="background-color: lightpink;">div 2<p>vikash</p></div>
            
              <div style="display: grid;
              margin-top: 20px;
        grid-template-columns: 100px 100px;">
            <div style="background-color: lightblue;">div 1</div>
            <div style="background-color: lightpink;">div 2<p>vikash</p></div>
            
              <div style="display: grid;
              margin-top: 20px;
        grid-template-columns: 100px 100px 200px;">
            <div style="background-color: lightblue;">div 1</div>
            <div style="background-color: lightpink;">div 2<p>vikash</p></div>
            <div style="background-color: lightgoldenrodyellow;">div 3<p>raj</p></div>
            

            <div style="display: grid;
                margin-top: 20px;
                grid-template-columns: 1fr 1fr 1fr;">
            <div style="background-color: lightblue; height:100px ;">div 1</div>
            <div style="background-color: lightpink;">div 2<p>vikash</p></div>
            <div style="background-color: lightgoldenrodyellow;">div 3<p>raj</p></div>
